<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Efootball Ultimate League</title>

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
background:#050816;
font-family:'Barlow Condensed',sans-serif;
color:white;
padding:10px;
}

.container{
max-width:900px;
margin:auto;
background:#0b1226;
border-radius:15px;
padding:15px;
}

.title{
text-align:center;
font-size:28px;
font-weight:800;
}

.title span{color:#f5c518;}

.table{
width:100%;
border-collapse:collapse;
margin-top:15px;
font-size:14px;
}

.table th{
background:#101935;
padding:10px;
color:#aaa;
}

.table td{
padding:10px;
text-align:center;
border-bottom:1px solid #1f2a44;
}

.team{
text-align:left;
font-weight:600;
}

.pts{
color:#f5c518;
font-weight:800;
}

.top1{background:#2e2a00;}
.top2{background:#1f1f1f;}
.top3{background:#2a1b00;}

.admin-btn{
background:#f5c518;
border:none;
padding:10px;
width:100%;
margin-top:10px;
font-weight:700;
}

.hidden{display:none;}

input,select{
width:100%;
padding:8px;
margin:5px 0;
background:#101935;
border:none;
color:white;
}

.history{
margin-top:15px;
font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<div class="title"><span>EFOOTBALL</span> ULTIMATE LEAGUE</div>

<table class="table">
<thead>
<tr>
<th>#</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>PTS</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<button class="admin-btn" onclick="login()">Admin Login</button>

<div id="adminPanel" class="hidden">

<select id="home"></select>
<input type="number" id="hg" placeholder="Home Goals">

<select id="away"></select>
<input type="number" id="ag" placeholder="Away Goals">

<button class="admin-btn" onclick="add()">Add Result</button>

<div class="history" id="history"></div>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCY4yEakU0Ce5nJiBQJVqqP9DAnfiqScwk",
  authDomain: "efootball-league-7a7f9.firebaseapp.com",
  projectId: "efootball-league-7a7f9",
  storageBucket: "efootball-league-7a7f9.firebasestorage.app",
  messagingSenderId: "923374666921",
  appId: "1:923374666921:web:abeede5bd449b39479d5b8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const PIN = "112244";

const TEAMS = [
"Pana fc","Go_ribe fc","Mhizta deco fc","Evil jp fc",
"Demonfx fc","Hunchoxchange fc","Manchi fc","Solution fc",
"Muna money ffc","Bm_042","Champion fc","Viper fc"
];

let data = {};

function initTeams(){
  TEAMS.forEach(t=>{
    if(!data[t]) data[t]={p:0,w:0,d:0,l:0,gf:0,ga:0};
  });
}

function pts(t){ return data[t].w*3 + data[t].d; }
function gd(t){ return data[t].gf - data[t].ga; }

function render(){
  let s=[...TEAMS].sort((a,b)=>pts(b)-pts(a)||gd(b)-gd(a));

  document.getElementById("table").innerHTML = s.map((t,i)=>`
  <tr>
    <td>${i+1}</td>
    <td class="team">${t}</td>
    <td>${data[t].p}</td>
    <td>${data[t].w}</td>
    <td>${data[t].d}</td>
    <td>${data[t].l}</td>
    <td>${gd(t)}</td>
    <td class="pts">${pts(t)}</td>
  </tr>`).join("");
}

// 🔥 LIVE SYNC
onSnapshot(doc(db,"league","table"), (snap)=>{
  data = snap.data() || {};
  initTeams();
  render();
});

// ADD RESULT
window.add = async function(){
  let h = home.value;
  let a = away.value;
  let hg = +hg.value;
  let ag = +ag.value;

  if(h===a) return alert("Same team!");

  data[h].p++; data[a].p++;
  data[h].gf+=hg; data[h].ga+=ag;
  data[a].gf+=ag; data[a].ga+=hg;

  if(hg>ag){data[h].w++; data[a].l++;}
  else if(hg<ag){data[a].w++; data[h].l++;}
  else{data[h].d++; data[a].d++;}

  await setDoc(doc(db,"league","table"), data);
};

// ADMIN LOGIN
window.login = function(){
  let p = prompt("Enter Admin PIN");
  if(p === PIN){
    document.getElementById("adminPanel").classList.remove("hidden");
  } else {
    alert("Wrong PIN");
  }
};

// FILL SELECT
TEAMS.forEach(t=>{
  home.innerHTML += `<option>${t}</option>`;
  away.innerHTML += `<option>${t}</option>`;
});
</script>

</body>
</html>
