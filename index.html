<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Efootball Ultimate League</title>

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
background:#050816;
font-family:'Barlow Condensed',sans-serif;
color:white;
padding:10px;
}

.container{
max-width:900px;
margin:auto;
background:#0b1226;
border-radius:15px;
padding:15px;
}

.title{
text-align:center;
font-size:28px;
font-weight:800;
}

.title span{color:#f5c518;}

.table{
width:100%;
border-collapse:collapse;
margin-top:15px;
font-size:14px;
}

.table th{
background:#101935;
padding:10px;
color:#aaa;
}

.table td{
padding:10px;
text-align:center;
border-bottom:1px solid #1f2a44;
}

.team{
text-align:left;
font-weight:600;
}

.pts{
color:#f5c518;
font-weight:800;
}

.top1{background:#2e2a00;}
.top2{background:#1f1f1f;}
.top3{background:#2a1b00;}

.admin-btn{
background:#f5c518;
border:none;
padding:10px;
width:100%;
margin-top:10px;
font-weight:700;
}

.hidden{display:none;}

input,select{
width:100%;
padding:8px;
margin:5px 0;
background:#101935;
border:none;
color:white;
}

.history{
margin-top:15px;
font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<div class="title"><span>EFOOTBALL</span> ULTIMATE LEAGUE</div>

<table class="table">
<thead>
<tr>
<th>#</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>PTS</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<button class="admin-btn" onclick="login()">Admin Login</button>

<div id="adminPanel" class="hidden">

<select id="home"></select>
<input type="number" id="hg" placeholder="Home Goals">

<select id="away"></select>
<input type="number" id="ag" placeholder="Away Goals">

<button class="admin-btn" onclick="add()">Add Result</button>

<div class="history" id="history"></div>

</div>

</div>

<script>
const PIN="112244"; // change this

const TEAMS=[
"Pana fc","Go_ribe fc","Mhizta deco fc","Evil jp fc",
"Demonfx fc","Hunchoxchange fc","Manchi fc","Solution fc",
"Muna money ffc","Bm_042","Champion fc","Viper fc"
];

let teams=JSON.parse(localStorage.getItem("teams"))||{};
let results=JSON.parse(localStorage.getItem("results"))||[];

function init(){
if(Object.keys(teams).length===0){
TEAMS.forEach(t=>{
teams[t]={p:0,w:0,d:0,l:0,gf:0,ga:0};
});
}
}

function pts(t){return teams[t].w*3+teams[t].d;}
function gd(t){return teams[t].gf-teams[t].ga;}

function sort(){
return TEAMS.sort((a,b)=>{
if(pts(b)!=pts(a))return pts(b)-pts(a);
if(gd(b)!=gd(a))return gd(b)-gd(a);
return teams[b].gf-teams[a].gf;
});
}

function render(){
let s=sort();
document.getElementById("table").innerHTML=s.map((t,i)=>{
let rowClass=i==0?'top1':i==1?'top2':i==2?'top3':'';
return `<tr class="${rowClass}">
<td>${i+1}</td>
<td class="team">${t}</td>
<td>${teams[t].p}</td>
<td>${teams[t].w}</td>
<td>${teams[t].d}</td>
<td>${teams[t].l}</td>
<td>${gd(t)}</td>
<td class="pts">${pts(t)}</td>
</tr>`;
}).join("");
}

function fill(){
TEAMS.forEach(t=>{
home.innerHTML+=`<option>${t}</option>`;
away.innerHTML+=`<option>${t}</option>`;
});
}

function add(){
let h=home.value,a=away.value;
let hg=parseInt(document.getElementById("hg").value);
let ag=parseInt(document.getElementById("ag").value);

if(h===a)return alert("Same team!");

teams[h].p++; teams[a].p++;
teams[h].gf+=hg; teams[h].ga+=ag;
teams[a].gf+=ag; teams[a].ga+=hg;

if(hg>ag){teams[h].w++; teams[a].l++;}
else if(hg<ag){teams[a].w++; teams[h].l++;}
else{teams[h].d++; teams[a].d++;}

results.push(`${h} ${hg}-${ag} ${a}`);

localStorage.setItem("teams",JSON.stringify(teams));
localStorage.setItem("results",JSON.stringify(results));

render();
showHistory();
}

function showHistory(){
document.getElementById("history").innerHTML=
results.slice(-10).reverse().map(r=>`• ${r}`).join("<br>");
}

function login(){
let p=prompt("Enter Admin PIN");
if(p===PIN){
document.getElementById("adminPanel").classList.remove("hidden");
}else{
alert("Wrong PIN");
}
}

init();
fill();
render();
showHistory();
</script>

</body>
</html>
